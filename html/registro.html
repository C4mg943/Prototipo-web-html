<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniDeportes – Regístrate</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
</head>
<body>

  <div id="toast" class="toast"></div>

  <div class="page-wrapper">
    <header class="header">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <span></span><span></span>
          <span></span><span></span>
        </div>
        <span class="logo-text">UniDeportes</span>
      </a>
    </header>

    <main class="main-content" style="justify-content: center;">
      <div class="login-card">
        <h2 class="card-title">Crea tu cuenta</h2>
        <p class="card-subtitle">Regístrate con tus datos institucionales</p>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="reg-nombre">Nombre Completo</label>
            <div class="input-wrapper">
              <i class="input-icon ph ph-user"></i>
              <input id="reg-nombre" class="form-input" type="text" placeholder="Ej: Camilo Monsalve" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-email">Correo Institucional</label>
            <div class="input-wrapper">
              <i class="input-icon ph ph-envelope-simple"></i>
              <input id="reg-email" class="form-input" type="email" placeholder="usuario@unimagdalena.edu.co" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-password">Contraseña</label>
            <div class="input-wrapper">
              <i class="input-icon ph ph-lock-simple"></i>
              <input id="reg-password" class="form-input" type="password" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn-login">Registrarse</button>
        </form>

        <p class="register-text">
          ¿Ya tienes una cuenta?
          <a href="../index.html" class="register-link">Inicia sesión</a>
        </p>
      </div>
    </main>
  </div>

  <script>
    function showToast(message, type = 'error') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
    }

    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const nombre = document.getElementById('reg-nombre').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      if(nombre.trim() === '' || email.trim() === '' || password.trim() === '') {
        showToast('Por favor, completa todos los campos.', 'error');
        return;
      }

      // Guardamos el nombre en localStorage
      localStorage.setItem('userName', nombre);
      showToast('¡Registro exitoso! Redirigiendo...', 'success');
      
      // Esperamos 1.5 segundos para que el usuario lea el mensaje de éxito antes de ir al login
      setTimeout(() => {
        window.location.href = '../index.html';
      }, 1500);
    });
  </script>
</body>
</html>
